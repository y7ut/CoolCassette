name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            artifact: CoolCassette-macos-arm64
          - os: windows-latest
            platform: windows/amd64
            artifact: CoolCassette-windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v6

      - name: Setup Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Sync frontend_dist
        shell: bash
        run: |
          rm -rf desktop/frontend_dist
          cp -R web/dist desktop/frontend_dist

      - name: Download Android Platform Tools (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL https://dl.google.com/android/repository/platform-tools-latest-darwin.zip -o platform-tools.zip
          unzip -q platform-tools.zip
          mv platform-tools platform-tools-macos

      - name: Download Android Platform Tools (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sL https://dl.google.com/android/repository/platform-tools-latest-windows.zip -o platform-tools.zip
          unzip -q platform-tools.zip
          mv platform-tools platform-tools-win

      - name: Build Wails app
        shell: bash
        working-directory: desktop
        run: wails build -tags "desktop,production" -s -skipbindings -platform ${{ matrix.platform }} -v 2

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp -R platform-tools-macos desktop/build/bin/CoolCassette.app/Contents/MacOS/platform-tools
          mkdir -p desktop/build/dist
          tar -czf "desktop/build/dist/CoolCassette-${VERSION}-macos-arm64.tar.gz" \
            -C desktop/build/bin CoolCassette.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $stage = "desktop/build/dist/CoolCassette"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item desktop/build/bin/CoolCassette.exe $stage/
          Copy-Item -Recurse platform-tools-win "$stage/platform-tools"
          Compress-Archive -Path $stage -DestinationPath "desktop/CoolCassette-$version-windows-amd64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/build/dist/*.tar.gz
            desktop/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
