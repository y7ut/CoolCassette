name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          working-directory: web

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Download Android Platform Tools
        run: |
          curl -sL https://dl.google.com/android/repository/platform-tools-latest-darwin.zip -o platform-tools.zip
          unzip -q platform-tools.zip
          mv platform-tools platform-tools-macos

      - name: Build
        run: bash desktop/build-app.sh
        env:
          COOLCASSETTE_MUSIC_DIRS: ""
          WAMPY_DIR: ""

      - name: Package tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p desktop/build/dist-macos
          tar -czf "desktop/build/dist-macos/CoolCassette-${VERSION}-macos-arm64.tar.gz" \
            -C desktop/build/bin CoolCassette.app

      - uses: actions/upload-artifact@v4
        with:
          name: CoolCassette-macos-arm64
          path: desktop/build/dist-macos/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          working-directory: web

      - name: Download Android Platform Tools
        shell: bash
        run: |
          curl -sL https://dl.google.com/android/repository/platform-tools-latest-windows.zip -o platform-tools.zip
          unzip -q platform-tools.zip
          mv platform-tools platform-tools-win

      - name: Build
        shell: bash
        run: bash desktop/build-win-zip.sh "${GITHUB_REF_NAME:-dev}"

      - uses: actions/upload-artifact@v4
        with:
          name: CoolCassette-windows-amd64
          path: desktop/*.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
